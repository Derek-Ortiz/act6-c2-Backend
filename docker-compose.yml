
services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: soa_node_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on: []
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - soa_shared_network

networks:
  soa_shared_network:
    external: true